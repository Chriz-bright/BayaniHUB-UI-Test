<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BayaniHUB | File Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lavender-bg': '#F0F3FF',
                        'sleek-dark': '#1E1B4B',
                        'accent-indigo': '#6366f1'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        #map { height: 400px; width: 100%; border-radius: 1.5rem; z-index: 1; }
    </style>
</head>
<body class="bg-lavender-bg text-sleek-dark font-sans flex min-h-screen relative">

    <div id="success-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-sleek-dark/40 backdrop-blur-md"></div>
        
        <div class="glass-panel bg-white/90 p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center relative z-10 transform scale-95 animate-in fade-in zoom-in duration-300">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                ✓
            </div>
            <h3 class="text-2xl font-black mb-2">Report Filed!</h3>
            <p class="text-indigo-400 mb-6">Your contribution has been logged. Thank you for being a Bayani.</p>
            
            <div class="bg-lavender-bg p-4 rounded-2xl mb-8">
                <p class="text-[10px] font-black uppercase text-indigo-300">Possible Points Earned</p>
                <p class="text-2xl font-bold text-accent-indigo">+50 XP</p>
            </div>

            <button onclick="window.location.href='index.html'" class="w-full bg-sleek-dark text-white py-4 rounded-xl font-bold hover:opacity-90 transition">
                Back to Dashboard
            </button>
        </div>
    </div>

    <aside class="w-64 bg-white/70 border-r border-indigo-100 p-6 flex flex-col fixed h-full z-50">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-sleek-dark text-white rounded-lg flex items-center justify-center font-bold">B</div>
            <h1 class="text-xl font-bold tracking-tight">BayaniHUB</h1>
        </div>
        <nav class="space-y-4 flex-1">
            <a href="home.html"  class="flex items-center gap-4 p-3 text-indigo-400 hover:bg-white rounded-xl transition font-medium" ><span>H</span> Home</a>
             <a href="report.html" class="flex items-center gap-4 p-3 bg-sleek-dark text-white rounded-xl font-bold shadow-lg shadow-indigo-200"><span>R</span>Report</a>
            <a href="status.html" class="flex items-center gap-4 p-3 text-indigo-400 hover:bg-white rounded-xl transition font-medium"><span>S</span>Status</a>
        </nav>
        <div class="pt-6 border-t border-indigo-100">
            <a href="logout.html" class="flex items-center gap-4 p-3 text-red-400 hover:bg-red-50 rounded-xl transition font-bold"><span>L</span> Logout</a>
        </div>
    </aside>

    <main class="flex-1 ml-64 p-8 lg:p-12">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-4xl font-black tracking-tight">File Report</h2>
                <p class="text-indigo-400 font-medium">Pin the issue and help your community.</p>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-5 gap-8">
            <div class="xl:col-span-3">
                <div class="glass-panel bg-white/60 p-4 rounded-[2rem] shadow-sm">
                    <div id="map"></div>
                </div>
            </div>

            
            <div class="xl:col-span-2">
                <div class="glass-panel bg-white/80 p-8 rounded-[2rem] shadow-xl border-white space-y-5">
                    <select class="w-full bg-white p-4 rounded-xl border border-indigo-50 outline-none">
                        <option>Road Damage</option>
                        <option>Utilities/Street Light</option>
                        <option>Plumbing</option>
                        <option>Others(Specify in the description box)</option>
                    </select>
                    <textarea class="w-full bg-white p-4 rounded-xl border border-indigo-50 h-32 outline-none" placeholder="Describe the issue..."></textarea>
                    
                    <div id="preview-box" onclick="document.getElementById('file-input').click()" class="w-full h-32 border-2 border-dashed border-indigo-100 rounded-xl flex items-center justify-center cursor-pointer">
                        <span class="text-indigo-300"> Add Image</span>
                    </div>
                    <input type="file" id="file-input" class="hidden" accept="image/*">

                    <button onclick="showSuccess()" class="w-full bg-sleek-dark text-white py-5 rounded-2xl font-black text-lg shadow-2xl">
                        Submit Report
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // LEAFLET MAP LOGIC
        var map = L.map('map').setView([10.3157, 123.8854], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        var marker = L.marker([10.3157, 123.8854], {draggable: true}).addTo(map);

        // IMAGE PREVIEW
        document.getElementById('file-input').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('preview-box').innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        // SUCCESS MODAL LOGIC
        function showSuccess() {
            document.getElementById('success-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
