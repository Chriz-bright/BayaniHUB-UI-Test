<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BayanihanHub - Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex">
    <aside class="fixed left-0 top-0 h-screen w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
        <div class="p-6 border-b border-indigo-800">
            <h1 class="text-2xl font-bold text-lavender-100">BayanihanHub</h1>
        </div>
        <nav class="flex-1 p-4">
            <ul class="space-y-2">
                <li><a href="index.html" class="flex items-center p-3 rounded-lg hover:bg-indigo-800 transition">🏠 <span class="ml-3">Dashboard</span></a></li>
                <li><a href="report.html" class="flex items-center p-3 rounded-lg bg-indigo-700 border-r-4 border-indigo-300">🚩 <span class="ml-3">Report Issue</span></a></li>
                <li><a href="rewards.html" class="flex items-center p-3 rounded-lg hover:bg-indigo-800 transition">🎁 <span class="ml-3">Rewards</span></a></li>
                <li><a href="settings.html" class="flex items-center p-3 rounded-lg hover:bg-indigo-800 transition">⚙️ <span class="ml-3">Settings</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="ml-64 p-10 w-full flex justify-center items-center">
        <div class="max-w-xl w-full bg-white p-10 rounded-3xl shadow-xl border border-slate-200">
            <h2 class="text-3xl font-bold text-indigo-900 mb-6 text-center">New Incident Report</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Subject" class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
                <select class="w-full p-4 bg-slate-50 border rounded-xl outline-none">
                    <option>Waste Management</option>
                    <option>Infrastructure</option>
                </select>
                <textarea placeholder="Details..." class="w-full p-4 bg-slate-50 border rounded-xl h-32 outline-none"></textarea>
                <button class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg hover:bg-indigo-700 transition">Submit to BayanihanHub</button>
            </form>
        </div>
    </main>
</body>
</html>
