<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BayaniHUB | Developer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lavender-bg': '#E0E7FF',
                        'sleek-dark': '#1E1B4B',
                        'glass-white': 'rgba(255, 255, 255, 0.7)',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="bg-lavender-bg text-sleek-dark font-sans min-h-screen">

    <div class="flex">
        <aside class="w-20 lg:w-64 bg-white/50 min-h-screen border-r border-indigo-100 flex flex-col items-center lg:items-start p-6">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-sleek-dark text-white rounded-lg flex items-center justify-center font-bold">B</div>
                <h1 class="hidden lg:block text-xl font-bold tracking-tight">BayaniHUB</h1>
            </div>
            <nav class="space-y-4 flex-1">
                <a href="#" class="flex items-center gap-4 p-3 bg-sleek-dark text-white rounded-xl font-bold shadow-lg shadow-indigo-200"><span>H</span> Home</a>
                <a href="#" class="flex items-center gap-4 p-3 text-indigo-400 hover:bg-white rounded-xl transition font-medium"><span>R</span> Report</a>
                <a href="#" class="flex items-center gap-4 p-3 text-indigo-400 hover:bg-white rounded-xl transition font-medium"><span>S</span> Status</a>
            </nav>
            <div class="pt-6 border-t border-indigo-100">
                <button onclick="handleLogout()" class="flex items-center gap-4 p-3 text-red-400 hover:bg-red-50 rounded-xl transition font-bold w-full"><span>L</span> Logout</button>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-3xl font-bold">Good morning, <span id="user-name">...</span></h2>
                    <p class="text-indigo-400 font-medium">You have <span id="report-count">0</span> reports requiring attention.</p>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="bg-white/40 px-4 py-2 rounded-full border border-white font-bold text-sm">
                        ⭐ <span id="user-points">0</span> Points
                    </div>
                    <button class="bg-sleek-dark text-white px-6 py-2.5 rounded-xl font-semibold hover:opacity-90 transition">
                        New Report
                    </button>
                </div>
            </header>

            <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
                <div id="featured-report" class="lg:col-span-2 glass-card bg-white/40 p-8 rounded-[2rem] shadow-sm">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-xs font-black uppercase tracking-widest text-indigo-400">Current Status</span>
                        <div class="w-3 h-3 bg-indigo-500 rounded-full animate-pulse"></div>
                    </div>
                    <h3 id="featured-title" class="text-4xl font-bold mb-4">Loading...</h3>
                    <p id="featured-desc" class="text-indigo-600/80 leading-relaxed max-w-lg mb-6">Fetching latest updates...</p>
                    <div class="flex gap-2">
                        <span id="featured-id" class="px-3 py-1 bg-white/50 rounded-lg text-xs font-bold border border-white">#---</span>
                    </div>
                </div>

                <div class="glass-card bg-sleek-dark text-white p-8 rounded-[2rem] flex flex-col justify-between">
                    <h4 class="font-bold text-lg opacity-60">Civic Rank</h4>
                    <div class="text-center py-4">
                        <p id="user-rank" class="text-6xl font-black italic">--</p>
                        <p class="text-xs uppercase tracking-widest mt-2 opacity-50">Community Member</p>
                    </div>
                    <button class="w-full py-3 bg-white/10 hover:bg-white/20 rounded-xl font-bold text-sm transition">
                        Claim Rewards
                    </button>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-end mb-6">
                    <h3 class="text-xl font-bold">Recent Community Reports</h3>
                    <button class="text-sm font-bold text-indigo-500 hover:underline">View All</button>
                </div>

                <div id="reports-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </section>
        </main>
    </div>

    <script>
        /**
         * 1. CONFIGURATION
         * Replace this URL with your actual API endpoint later 
         * (e.g., http://localhost:3000/api)
         */
        const API_BASE_URL = 'https://api.example.com';

        /**
         * 2. FETCH DATA ON LOAD
         */
        window.addEventListener('DOMContentLoaded', () => {
            fetchUserData();
            fetchReports();
        });

        /**
         * 3. BACKEND CONNECTION FUNCTIONS
         */
        async function fetchUserData() {
            try {
                // Logic: 
                // const response = await fetch(`${API_BASE_URL}/user/profile`);
                // const data = await response.json();
                
                // MOCK DATA (Replace with your fetch logic)
                const mockUser = { name: 'Zoa', points: 150, rank: 'A+', alerts: 3 };

                document.getElementById('user-name').innerText = mockUser.name;
                document.getElementById('user-points').innerText = mockUser.points;
                document.getElementById('user-rank').innerText = mockUser.rank;
                document.getElementById('report-count').innerText = mockUser.alerts;
            } catch (error) {
                console.error("Error fetching user:", error);
            }
        }

        async function fetchReports() {
            try {
                // Logic:
                // const response = await fetch(`${API_BASE_URL}/reports`);
                // const reports = await response.json();

                // MOCK DATA
                const mockReports = [
                    { id: '892', title: 'Brgy. Luz Drainage', status: 'ASSIGNED', icon: '📍', loc: 'P. del Rosario' },
                    { id: '893', title: 'Streetlight Failure', status: 'REVIEWING', icon: '💡', loc: 'V. Rama Ave' }
                ];

                const container = document.getElementById('reports-list');
                container.innerHTML = ''; // Clear "loading" content

                mockReports.forEach(report => {
                    const card = `
                        <div class="glass-card bg-white/20 hover:bg-white/40 p-6 rounded-2xl transition flex items-center gap-6 group cursor-pointer">
                            <div class="w-16 h-16 bg-white/60 rounded-xl flex items-center justify-center text-2xl group-hover:scale-105 transition">${report.icon}</div>
                            <div>
                                <h5 class="font-bold">${report.title}</h5>
                                <p class="text-sm text-indigo-500/70">${report.loc} • Just now</p>
                            </div>
                            <div class="ml-auto text-right">
                                <span class="text-xs font-black text-indigo-500">${report.status}</span>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                // Update the featured big card with the first report
                if(mockReports.length > 0) {
                    document.getElementById('featured-title').innerText = mockReports[0].title;
                    document.getElementById('featured-id').innerText = `#CIVIC-${mockReports[0].id}`;
                    document.getElementById('featured-desc').innerText = "Update: Verification complete. Team is on site.";
                }

            } catch (error) {
                console.error("Error fetching reports:", error);
            }
        }

        function handleLogout() {
            // Logic: Clear tokens from localStorage and redirect
            // localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
