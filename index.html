<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BayaniHUB | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'lavender-bg': '#F5F7FF', 'sleek-dark': '#1E1B4B' } } } }
    </script>
    <style>.glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }</style>
</head>
<body class="bg-lavender-bg text-sleek-dark font-sans flex min-h-screen">

    <aside class="w-64 bg-white/50 border-r border-indigo-100 p-6 flex flex-col fixed h-full">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-10 h-10 bg-sleek-dark text-white rounded-lg flex items-center justify-center font-bold">B</div>
            <h1 class="text-xl font-bold">BayaniHUB</h1>
        </div>
        <nav class="space-y-4 flex-1">
            <a href="index.html" class="flex items-center gap-4 p-3 bg-sleek-dark text-white rounded-xl font-bold"><span>🏠</span> Home</a>
            <a href="map.html" class="flex items-center gap-4 p-3 text-indigo-400 hover:bg-white rounded-xl transition"><span>📍</span> Live Map</a>
            <a href="report.html" class="flex items-center gap-4 p-3 text-indigo-400 hover:bg-white rounded-xl transition"><span>➕</span> New Report</a>
            <a href="login.html" class="flex items-center gap-4 p-3 text-red-400 hover:bg-red-50 rounded-xl transition mt-20"><span>🚪</span> Logout</a>
        </nav>
    </aside>

    <main class="flex-1 ml-64 p-10">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h2 id="user-greeting" class="text-4xl font-black tracking-tight">Mabuhay, Zoa!</h2>
                <p class="text-indigo-400 font-medium">Your community is 92% operational today.</p>
            </div>
            <div class="glass-card bg-white/40 p-4 rounded-2xl border border-white text-right">
                <p class="text-xs font-black text-indigo-300 uppercase">Total Merit</p>
                <p class="text-2xl font-bold">1,240 pts</p>
                <div class="w-32 h-1.5 bg-indigo-100 rounded-full mt-2 overflow-hidden">
                    <div class="bg-indigo-500 h-full" style="width: 75%"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card bg-white/40 p-8 rounded-[2.5rem]">
                <h3 class="text-xl font-bold mb-4">Active Reports</h3>
                <div class="space-y-4">
                    <div class="p-4 bg-white/60 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="font-bold">Drainage Issue</p>
                            <p class="text-xs text-indigo-400">Brgy. Luz • Assigned</p>
                        </div>
                        <span class="text-indigo-600 font-bold text-sm">+20 pts</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
