<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BayanihanHub - Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex">
    <aside class="fixed left-0 top-0 h-screen w-64 bg-indigo-900 text-white flex flex-col shadow-2xl">
        <div class="p-6 border-b border-indigo-800">
            <h1 class="text-2xl font-bold text-lavender-100">BayanihanHub</h1>
        </div>
        <nav class="flex-1 p-4">
            <ul class="space-y-2">
                <li><a href="index.html" class="flex items-center p-3 rounded-lg hover:bg-indigo-800 transition">🏠 <span class="ml-3">Dashboard</span></a></li>
                <li><a href="report.html" class="flex items-center p-3 rounded-lg hover:bg-indigo-800 transition">🚩 <span class="ml-3">Report Issue</span></a></li>
                <li><a href="rewards.html" class="flex items-center p-3 rounded-lg bg-indigo-700 border-r-4 border-indigo-300">🎁 <span class="ml-3">Rewards</span></a></li>
                <li><a href="settings.html" class="flex items-center p-3 rounded-lg hover:bg-indigo-800 transition">⚙️ <span class="ml-3">Settings</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="ml-64 p-10 w-full">
        <h2 class="text-4xl font-bold text-indigo-900 mb-8">Redeem Rewards</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white rounded-3xl p-8 border border-slate-200 shadow-md text-center">

                <h3 class="text-2xl font-bold text-slate-800">1 Kilo Rice</h3>
                <p class="text-indigo-600 font-bold text-xl mt-2">1,200 Points</p>
                <button class="w-full mt-6 py-4 bg-indigo-900 text-white rounded-2xl font-bold hover:bg-indigo-700 transition">Redeem</button>
            </div>
            <div class="bg-white rounded-3xl p-8 border border-slate-200 shadow-md text-center">
                <div class="text-5xl mb-4">🎫</div>
                <h3 class="text-2xl font-bold text-slate-800">P50 Grocery Pass</h3>
                <p class="text-indigo-600 font-bold text-xl mt-2">5,000 Points</p>
                <button class="w-full mt-6 py-4 bg-indigo-900 text-white rounded-2xl font-bold hover:bg-indigo-700 transition">Redeem</button>
            </div>
        </div>
    </main>

</html>
